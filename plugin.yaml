---
# Navigaite Trunk Plugin
# Centralized linting, formatting, and security configuration for all Navigaite projects.
# https://github.com/navigaite/nvgt-trunk-plugin

version: 0.1
required_trunk_version: '>= 1.22.0'
cli:
  version: 1.22.12

# Applicable linters and actions will run with these runtime versions
runtimes:
  enabled:
    - go@1.23.6
    - node@22.16.0
    - python@3.13.3
    - ruby@3.4.2

lint:
  definitions:
    - name: eslint
      commands:
        - name: lint
          run_when: [cli, monitor, ci] # do not run from lsp (may be too slow)

  enabled:
    # --- JavaScript / TypeScript ---
    - eslint@10.0.2
    - prettier@3.8.1:
        packages:
          - prettier-plugin-tailwindcss@0.7.2
    - stylelint@17.4.0:
        packages:
          - stylelint-config-standard@40.0.0
          - stylelint-config-tailwindcss@1.0.1
          - stylelint-config-clean-order@8.0.1
    - sort-package-json@3.6.1
    - svgo@4.0.0

    # --- Python (ruff replaces black, isort, pylint, bandit, flake8) ---
    - ruff@0.15.4
    - mypy@1.19.1

    # --- Go ---
    - gofmt@1.20.4
    - golangci-lint@2.10.1

    # --- Ruby ---
    - rubocop@1.39.0

    # --- Rust ---
    - rustfmt@1.68.2
    - clippy@1.71.1

    # --- C/C++ ---
    - clang-format@17.0.1
    - clang-tidy@17.0.1
    - pragma-once

    # --- Shell ---
    - shellcheck@0.11.0
    - shfmt@3.6.0

    # --- Docker ---
    - hadolint@2.14.0

    # --- Infrastructure as Code ---
    - checkov@3.2.506
    - terrascan@1.19.9
    - cfnlint@1.45.0
    - buildifier@8.5.1

    # --- Data formats ---
    - yamllint@1.38.0
    - taplo@0.10.0
    - sql-formatter@15.7.2
    - prisma@7.4.2

    # --- Documentation ---
    - markdownlint@0.47.0
    - markdown-link-check@3.13.7

    # --- Security ---
    - trufflehog@3.93.6
    - semgrep@1.153.1
    - osv-scanner@2.3.3

    # --- CI / Config ---
    - actionlint@1.7.11
    - renovate@43.46.6
    - dotenv-linter@4.0.0
    - dustilock@1.2.0
    - nancy@1.2.0
    - buf-lint@1.31.0!

    # --- Images ---
    - oxipng@10.1.0

    # --- Git ---
    - git-diff-check

  # Sourcing repos will have these configs available to applicable linters
  exported_configs:
    - configs:
        - configs/.checkov.yaml
        - configs/.commitlintrc.json
        - configs/.cspell.json
        - configs/.dependency-cruiser.json
        - configs/.hadolint.yaml
        - configs/.markdownlint.yaml
        - configs/.npmcheckrc
        - configs/.prettierignore
        - configs/.prettierrc
        - configs/.remarkrc.yaml
        - configs/.shellcheckrc
        - configs/.sqlfluff
        - configs/.stylelintrc.json
        - configs/.yamllint.yaml
        - configs/biome.json
        - configs/knip.json
        - configs/ruff.toml
        - configs/rustfmt.toml
        - configs/svgo.config.mjs

  ignore:
    - linters: [trufflehog, osv-scanner]
      paths: [package-lock.json]

# By sourcing this plugin, repos will enable these actions
actions:
  enabled:
    - trunk-announce
    - trunk-cache-prune
    - trunk-upgrade-available
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
