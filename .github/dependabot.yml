---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - automerge
    commit-message:
      prefix: 'chore(deps):'
      include: scope

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
      - automerge
    commit-message:
      prefix: 'chore(deps):'
      include: scope
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
