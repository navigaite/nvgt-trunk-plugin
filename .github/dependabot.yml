# Managed by navigaite/.github bootstrap. Do not edit manually —
# changes will be overwritten the next time bootstrap-maintenance.sh runs.
#
# Scope:
# - This bootstrap-managed file ONLY configures the github-actions
#   ecosystem (third-party action bumps).
# - The reusable `navigaite/.github` pipeline is pinned via rolling `@v2` tag,
#   which release-please retargets on every release. Do NOT let Dependabot
#   SHA-pin it — that would cause noise PRs on every pipeline patch.
# - Native package ecosystems (npm, pip, docker, etc.) are NOT auto-added
#   here. If a repo has a bespoke `dependabot.yml` (without the "Managed by"
#   header above), the bootstrap script preserves it and skips this file.
#   To get github-actions updates AND e.g. npm in the same repo, drop the
#   sentinel header and maintain `dependabot.yml` by hand.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ['*']
    ignore:
      # Rolling major tag — never pin. Updates come from retagging in navigaite/.github.
      - dependency-name: navigaite/.github/*
    commit-message:
      prefix: chore
      include: scope
