---
name: 📦 Weekly Plugin Release
on:
  push:
    branches: [main]
  schedule:
    # Every Monday at 9 AM UTC (after trunk-upgrade at 8 AM)
    - cron: 0 9 * * 1
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (skip release creation)
        type: boolean
        default: false
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  check-updates:
    name: 🔍 Check for Updates
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      head_sha: ${{ steps.check.outputs.head_sha }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 🔍 Check for changes since last release
        id: check
        run: |
          # Pin the HEAD SHA used for changelog generation so the downstream
          # release job tags exactly the commits summarized here (avoids a
          # race where main advances between jobs).
          HEAD_SHA=$(git rev-parse HEAD)
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$LAST_TAG" ]]; then
            echo "No previous tag found, treating as first release"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGES=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges)
          if [[ -z "$CHANGES" ]]; then
            echo "No changes since $LAST_TAG"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes found since $LAST_TAG:"
            echo "$CHANGES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      - name: 📝 Generate changelog
        id: changelog
        if: steps.check.outputs.has_changes == 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          {
            echo "changelog<<CHANGELOG_EOF"

            # Collect linter version changes from commits
            UPGRADE_COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges --grep="trunk-upgrade" || true)
            if [[ -n "$UPGRADE_COMMITS" ]]; then
              echo "### ⬆️ Tool Updates"
              echo ""
              echo "$UPGRADE_COMMITS" | while read -r line; do
                MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
                echo "- $MSG"
              done
              echo ""
            fi

            # Collect feature commits
            FEAT_COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges --grep="^feat" || true)
            if [[ -n "$FEAT_COMMITS" ]]; then
              echo "### ✨ Features"
              echo ""
              echo "$FEAT_COMMITS" | while read -r line; do
                MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
                echo "- $MSG"
              done
              echo ""
            fi

            # Collect fix commits
            FIX_COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges --grep="^fix" || true)
            if [[ -n "$FIX_COMMITS" ]]; then
              echo "### 🐛 Bug Fixes"
              echo ""
              echo "$FIX_COMMITS" | while read -r line; do
                MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
                echo "- $MSG"
              done
              echo ""
            fi

            # Collect all other commits
            OTHER_COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges \
              --grep="^feat" --grep="^fix" --grep="trunk-upgrade" --invert-grep || true)
            if [[ -n "$OTHER_COMMITS" ]]; then
              echo "### 🔧 Maintenance"
              echo ""
              echo "$OTHER_COMMITS" | while read -r line; do
                MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
                echo "- $MSG"
              done
              echo ""
            fi

            # Show current tool versions from plugin.yaml
            echo "### 📋 Current Plugin Info"
            echo ""
            LINTER_COUNT=$(grep -cE '^\s+- \S+@' plugin.yaml || echo "0")
            echo "- **Linters enabled:** $LINTER_COUNT"
            echo ""

            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT
  create-release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: check-updates
    if: needs.check-updates.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
    steps:
      - name: 🔑 Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}

      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          # Pin to the same SHA that check-updates generated the changelog from
          # so the tag we create reflects exactly those commits.
          ref: ${{ needs.check-updates.outputs.head_sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: 👤 Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: 🔢 Determine version
        id: bump
        run: |
          set -euo pipefail

          # Restrict to semver release tags (vMAJOR.MINOR.PATCH) to ignore any
          # non-release tags (maintenance, CI, etc.).
          SEMVER_PATTERN='v[0-9]*.[0-9]*.[0-9]*'
          LAST_TAG=$(git describe --tags --abbrev=0 --match "$SEMVER_PATTERN" 2>/dev/null || echo "v0.0.0")

          # Validate the resolved tag matches strict semver before arithmetic.
          if ! [[ "$LAST_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Latest release tag '$LAST_TAG' does not match expected semver format (vMAJOR.MINOR.PATCH)"
            exit 1
          fi

          RANGE="HEAD"
          if [[ "$LAST_TAG" != "v0.0.0" ]]; then
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Semantic bump rules:
          # - major: any BREAKING CHANGE or conventional "type(scope)!:" commit
          # - minor: any conventional "feat" commit
          # - patch: default
          BUMP_TYPE="patch"
          if git log "$RANGE" --format='%s%n%b' | grep -Eiq 'BREAKING CHANGE:|^[a-z]+(\([^)]+\))?!:'; then
            BUMP_TYPE="major"
          elif git log "$RANGE" --format='%s' | grep -Eiq '^feat(\([^)]+\))?:'; then
            BUMP_TYPE="minor"
          fi

          # Compute next version from LAST_TAG (the source of truth for releases).
          CURRENT_VERSION="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
      - name: 📝 Bump package.json and push to main
        id: commit
        run: |
          set -euo pipefail
          NEW_VERSION="${{ steps.bump.outputs.version }}"
          npm version "${NEW_VERSION#v}" --no-git-tag-version --allow-same-version >/dev/null

          # Idempotent: if package.json is already at NEW_VERSION (e.g., a previous
          # run of this job already pushed the bump before failing elsewhere), skip
          # the commit/push and reuse the existing HEAD.
          if git diff --quiet package.json package-lock.json; then
            echo "No version changes to commit (already at ${NEW_VERSION})"
            echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
            exit 0
          fi

          git add package.json package-lock.json
          # [skip ci] avoids running the Navigaite Pipeline on this bump commit.
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"
          # We checked out a detached HEAD at needs.check-updates.outputs.head_sha,
          # so push explicitly to the main ref. Fails fast (non-fast-forward) if
          # someone pushed to main between check-updates and now — which is the
          # safe behavior; we'd rather fail than tag a diverged history.
          git push origin HEAD:main
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: 📦 Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Target the bump commit explicitly so the tag includes the synced package.json
          gh release create "${{ steps.bump.outputs.version }}" \
            --target "${{ steps.commit.outputs.commit_sha }}" \
            --title "${{ steps.bump.outputs.version }}" \
            --notes "$(cat <<RELEASE_EOF
          ## 📦 Weekly Plugin Release — ${{ steps.bump.outputs.version }}

          ${{ needs.check-updates.outputs.changelog }}

          ---

          ### 🔗 Usage

          Update your \`.trunk/trunk.yaml\` to use this version:

          \`\`\`yaml
          plugins:
            sources:
              - id: navigaite
                uri: https://github.com/navigaite/nvgt-trunk-plugin
                ref: ${{ steps.bump.outputs.version }}
          \`\`\`

          ---
          _Automated weekly release by Navigaite CI/CD_
          RELEASE_EOF
          )"
      - name: 📊 Release Summary
        run: |
          echo "### 📦 Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bump Type:** ${{ steps.bump.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
