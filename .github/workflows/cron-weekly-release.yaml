---
name: 📦 Weekly Plugin Release
on:
  schedule:
    # Every Monday at 9 AM UTC (after trunk-upgrade at 8 AM)
    - cron: 0 9 * * 1
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (skip release creation)
        type: boolean
        default: false
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  check-updates:
    name: 🔍 Check for Updates
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 🔍 Check for changes since last release
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$LAST_TAG" ]]; then
            echo "No previous tag found, treating as first release"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGES=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges)
          if [[ -z "$CHANGES" ]]; then
            echo "No changes since $LAST_TAG"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes found since $LAST_TAG:"
            echo "$CHANGES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      - name: 📝 Generate changelog
        id: changelog
        if: steps.check.outputs.has_changes == 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          {
            echo "changelog<<CHANGELOG_EOF"

            # Collect linter version changes from commits
            UPGRADE_COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges --grep="trunk-upgrade" || true)
            if [[ -n "$UPGRADE_COMMITS" ]]; then
              echo "### ⬆️ Tool Updates"
              echo ""
              echo "$UPGRADE_COMMITS" | while read -r line; do
                MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
                echo "- $MSG"
              done
              echo ""
            fi

            # Collect feature commits
            FEAT_COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges --grep="^feat" || true)
            if [[ -n "$FEAT_COMMITS" ]]; then
              echo "### ✨ Features"
              echo ""
              echo "$FEAT_COMMITS" | while read -r line; do
                MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
                echo "- $MSG"
              done
              echo ""
            fi

            # Collect fix commits
            FIX_COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges --grep="^fix" || true)
            if [[ -n "$FIX_COMMITS" ]]; then
              echo "### 🐛 Bug Fixes"
              echo ""
              echo "$FIX_COMMITS" | while read -r line; do
                MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
                echo "- $MSG"
              done
              echo ""
            fi

            # Collect all other commits
            OTHER_COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --no-merges \
              --grep="^feat" --grep="^fix" --grep="trunk-upgrade" --invert-grep || true)
            if [[ -n "$OTHER_COMMITS" ]]; then
              echo "### 🔧 Maintenance"
              echo ""
              echo "$OTHER_COMMITS" | while read -r line; do
                MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
                echo "- $MSG"
              done
              echo ""
            fi

            # Show current tool versions from plugin.yaml
            echo "### 📋 Current Plugin Info"
            echo ""
            LINTER_COUNT=$(grep -cE '^\s+- \S+@' plugin.yaml || echo "0")
            echo "- **Linters enabled:** $LINTER_COUNT"
            echo ""

            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT
  create-release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: check-updates
    if: needs.check-updates.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
    steps:
      - name: 🔑 Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_APP_PRIVATE_KEY }}

      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: 👤 Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: 🧹 Close stale release PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          mapfile -t PR_NUMBERS < <(
            gh pr list \
              --state open \
              --base main \
              --json number,headRefName \
              --jq '.[] | select(.headRefName | startswith("release-please--") or startswith("release/")) | .number'
          )

          if [[ ${#PR_NUMBERS[@]} -eq 0 ]]; then
            echo "No stale release PRs found."
            exit 0
          fi

          for pr in "${PR_NUMBERS[@]}"; do
            echo "Closing stale release PR #$pr"
            gh pr close "$pr" --comment "Closed by weekly automated release workflow."
          done
      - name: 🔢 Determine version
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="HEAD"
          if [[ -n "$LAST_TAG" ]]; then
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Semantic bump rules:
          # - major: any BREAKING CHANGE or conventional "type(scope)!:" commit
          # - minor: any conventional "feat" commit
          # - patch: default
          BUMP_TYPE="patch"
          if git log "$RANGE" --format='%s%n%b' | grep -Eiq 'BREAKING CHANGE:|^[a-z]+(\([^)]+\))?!:'; then
            BUMP_TYPE="major"
          elif git log "$RANGE" --format='%s' | grep -Eiq '^feat(\([^)]+\))?:'; then
            BUMP_TYPE="minor"
          fi

          NEW_VERSION=$(npm version "$BUMP_TYPE" --no-git-tag-version)
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
      - name: 📦 Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "${{ steps.bump.outputs.version }}" \
            --target main \
            --title "${{ steps.bump.outputs.version }}" \
            --notes "$(cat <<RELEASE_EOF
          ## 📦 Weekly Plugin Release — ${{ steps.bump.outputs.version }}

          ${{ needs.check-updates.outputs.changelog }}

          ---

          ### 🔗 Usage

          Update your \`.trunk/trunk.yaml\` to use this version:

          \`\`\`yaml
          plugins:
            sources:
              - id: navigaite
                uri: https://github.com/navigaite/nvgt-trunk-plugin
                ref: ${{ steps.bump.outputs.version }}
          \`\`\`

          ---
          _Automated weekly release by Navigaite CI/CD_
          RELEASE_EOF
          )"
      - name: 🔄 Create version bump PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="release/${{ steps.bump.outputs.version }}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(release): ${{ steps.bump.outputs.version }}" \
            --body "Automated version bump to ${{ steps.bump.outputs.version }}." \
            --base main \
            --head "$BRANCH" \
            --label "automerge"
      - name: 📊 Release Summary
        run: |
          echo "### 📦 Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bump Type:** ${{ steps.bump.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.bump.outputs.version }}" >> $GITHUB_STEP_SUMMARY
