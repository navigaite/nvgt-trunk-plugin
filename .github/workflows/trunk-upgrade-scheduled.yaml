# Managed by navigaite/.github bootstrap. Do not edit manually —
# changes will be overwritten the next time bootstrap-maintenance.sh runs.
#
# The cron minute/hour is staggered per repo to avoid a PR storm across
# all Navigaite repos. Bootstrap script substitutes 30 4 * * 4 at install time.
---
name: Trunk Upgrade Scheduled

on:
  schedule:
    - cron: '30 4 * * 4'
  workflow_dispatch: {}

permissions: {}

jobs:
  upgrade:
    # Job-level permissions cap the reusable workflow's job permissions.
    # The called workflow needs contents+pull-requests write to push a
    # branch and open a PR with the upgrade diff.
    permissions:
      contents: write
      pull-requests: write
    uses: navigaite/.github/.github/workflows/trunk-upgrade.yaml@v2
    secrets: inherit
