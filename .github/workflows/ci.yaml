---
# Navigaite Universal CI/CD Pipeline
# Docs: https://github.com/navigaite/.github/blob/main/docs/GETTING_STARTED.md

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group: {}

permissions:
  contents: write
  pull-requests: write
  security-events: write
  id-token: write

jobs:
  pipeline:
    uses: navigaite/.github/.github/workflows/universal-pipeline.yaml@v2
    with:
      config-file: .github/pipeline.yaml
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
