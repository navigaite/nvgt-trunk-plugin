---
# Navigaite Universal CI/CD Pipeline
# Uses shared reusable workflow from navigaite/.github

name: Navigaite Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group: {}

permissions:
  contents: write
  pull-requests: write
  deployments: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  pipeline:
    uses: navigaite/.github/.github/workflows/universal-pipeline.yaml@v2
    with:
      config-file: .github/pipeline.yaml
      # Work around TruffleHog push-mode edge case in the shared action by scanning on PRs only.
      skip-security: ${{ github.event_name != 'pull_request' }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

  check-gate:
    name: Check Gate
    if: always()
    needs: [pipeline]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate pipeline result
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | jq -e 'map(select(. == "failure" or . == "cancelled")) | length > 0' > /dev/null 2>&1; then
            echo "::error::Pipeline failed"
            exit 1
          fi
          echo "✅ All pipeline jobs passed"

  # Required by org ruleset — this repo has no dev branch, so all PRs target main directly
  branch-guard:
    name: Branch Guard
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: ✅ Allow PR
        run: echo "✅ Single-branch repo — all PRs target main directly"
