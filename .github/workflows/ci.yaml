---
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group: {}

permissions:
  contents: write
  pull-requests: write
  security-events: write
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.repository }}-pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  pipeline:
    uses: navigaite/.github/.github/workflows/universal-pipeline.yaml@main
    with:
      config-file: .github/pipeline.yaml
    secrets: inherit
