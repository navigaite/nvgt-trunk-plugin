# Example .trunk/trunk.yaml for repositories using the Navigaite Trunk Plugin
# Copy this to your project's .trunk/trunk.yaml and adjust as needed.
version: 0.1
cli:
  version: 1.25.0

# Source the Navigaite plugin to inherit all configurations
plugins:
  sources:
    - id: trunk
      uri: https://github.com/trunk-io/plugins
      ref: v1.7.2
    - id: navigaite
      uri: https://github.com/navigaite/nvgt-trunk-plugin
      ref: v5.0.25

# All linters, runtimes, configs, and actions are inherited from the plugin.
# Override or extend below as needed.

lint:
  disabled:
    # Disable linters that don't apply to your project.
    # Example: Disable Go linters for a pure Python project
    # - gofmt
    # - golangci-lint

  ignore:
    - linters: [ALL]
      paths:
        - generated/**
        - vendor/**
        - third_party/**
